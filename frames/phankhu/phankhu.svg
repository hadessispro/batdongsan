<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1125" preserveAspectRatio="none">

  <defs>
    <mask id="pk-mask">
      <rect x="0" y="0" width="2000" height="1125" fill="white" />
    </mask>
  </defs>

  <style>
    .zp {
      fill: transparent;
      stroke: transparent;
      stroke-width: 0;
      cursor: pointer;
      transition: stroke 0.3s ease, fill 0.3s ease, filter 0.3s ease;
    }

    .zp:hover {
      stroke: rgba(255, 241, 118, 0.82);
      stroke-width: 2.2;
      fill: rgba(255, 241, 118, 0.35);
      filter: drop-shadow(0 0 5px rgba(255, 213, 79, 0.4));
    }

    /* ── Active: viền neon liền sáng, KHÔNG fill — animation vẽ viền ── */
    .zp.active {
      stroke: #ffd54f;
      stroke-width: 1.6;
      fill: transparent;
      stroke-dasharray: 5000;
      stroke-dashoffset: 5000;
      animation: drawLine 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      filter: drop-shadow(0 0 3px #ffd54f)
             drop-shadow(0 0 8px rgba(255, 213, 79, 0.85))
             drop-shadow(0 0 20px rgba(255, 213, 79, 0.4))
             drop-shadow(0 0 50px rgba(255, 193, 7, 0.15));
    }

    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    #pk-dim {
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
  </style>

  <rect id="pk-dim" x="0" y="0" width="2000" height="1125"
        fill="rgb(0, 8, 7)" opacity="0" mask="url(#pk-mask)" />

